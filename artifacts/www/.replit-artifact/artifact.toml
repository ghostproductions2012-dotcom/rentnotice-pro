kind = "web"
previewPath = "/"
title = "RentNotice Pro Website"
version = "1.0.0"
id = "artifacts/www"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25116

[services.development]
run = "pnpm --filter @workspace/www run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/www", "run", "build" ]
publicDir = "artifacts/www/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/features"
to = "/features/index.html"

[[services.production.rewrites]]
from = "/how-it-works"
to = "/how-it-works/index.html"

[[services.production.rewrites]]
from = "/integrations"
to = "/integrations/index.html"

[[services.production.rewrites]]
from = "/faq"
to = "/faq/index.html"

[[services.production.rewrites]]
from = "/guidelines"
to = "/guidelines/index.html"

[[services.production.rewrites]]
from = "/support"
to = "/support/index.html"

[[services.production.rewrites]]
from = "/privacy"
to = "/privacy/index.html"

[[services.production.rewrites]]
from = "/terms"
to = "/terms/index.html"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25116"
BASE_PATH = "/"
