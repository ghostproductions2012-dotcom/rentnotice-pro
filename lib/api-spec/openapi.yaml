openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: plans
    description: Public pricing plans
  - name: auth
    description: Website account authentication
  - name: checkout
    description: Stripe checkout / signup flow
  - name: portal
    description: Authenticated company admin portal
  - name: license
    description: License verification API used by the desktop app
  - name: field
    description: Field assignment sync relay for the mobile companion
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags:
        - health
      summary: Health check
      description: Returns server health status
      responses:
        '200':
          description: Healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
  /www/plans:
    get:
      operationId: listPlans
      tags:
        - plans
      summary: List pricing plans (public)
      responses:
        '200':
          description: Available subscription tiers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Plan'
  /www/checkout/session:
    post:
      operationId: startCheckout
      tags:
        - checkout
      summary: Start signup + Stripe checkout for a plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupInput'
      responses:
        '200':
          description: Stripe Checkout session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckoutSession'
        '400':
          description: Invalid input (e.g. email already registered)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Payments unavailable (Stripe not configured)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /www/checkout/complete:
    post:
      operationId: completeCheckout
      tags:
        - checkout
      summary: 'Finalize a paid checkout session, provisioning company, master admin and license key'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckoutCompleteInput'
      responses:
        '200':
          description: Company provisioned (idempotent - returns existing result on retry)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProvisionResult'
        '400':
          description: Session not paid or unknown
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /www/auth/login:
    post:
      operationId: login
      tags:
        - auth
      summary: Log in with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginInput'
      responses:
        '200':
          description: Logged in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionUser'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /www/auth/logout:
    post:
      operationId: logout
      tags:
        - auth
      summary: Log out the current session
      responses:
        '204':
          description: Logged out
  /www/auth/me:
    get:
      operationId: getMe
      tags:
        - auth
      summary: Get the currently logged-in user
      responses:
        '200':
          description: Current session user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionUser'
        '401':
          description: Not logged in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /www/portal/overview:
    get:
      operationId: getPortalOverview
      tags:
        - portal
      summary: 'Company overview - license key, live status, subscription details'
      responses:
        '200':
          description: Portal overview
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortalOverview'
        '401':
          description: Not logged in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /www/portal/billing:
    post:
      operationId: createBillingSession
      tags:
        - portal
      summary: Create a Stripe billing portal session (manage/upgrade/cancel subscription)
      responses:
        '200':
          description: Billing portal session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckoutSession'
        '401':
          description: Not logged in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Requires admin role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /www/portal/users:
    get:
      operationId: listCompanyUsers
      tags:
        - portal
      summary: List company users and their roles
      responses:
        '200':
          description: Company user directory
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CompanyUser'
        '401':
          description: Not logged in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      operationId: inviteCompanyUser
      tags:
        - portal
      summary: Invite a user by email with a role (returns a shareable invite link)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InviteInput'
      responses:
        '201':
          description: Invitation created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InviteResult'
        '400':
          description: Email already in company or over seat limit
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Requires admin role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  '/www/portal/users/{userId}':
    patch:
      operationId: updateCompanyUser
      tags:
        - portal
      summary: Change a user's role or deactivate/reactivate them
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompanyUserUpdate'
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanyUser'
        '400':
          description: Invalid change (e.g. demoting the master admin)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Requires admin role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  '/www/portal/users/{userId}/invite-code':
    get:
      operationId: getInviteCode
      tags:
        - portal
      summary: View the pending invite code for an invited user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Pending invite code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InviteCode'
        '403':
          description: Requires admin role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found or no longer pending
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      operationId: regenerateInviteCode
      tags:
        - portal
      summary: Regenerate the invite code for a still-pending invitee (invalidates the old code)
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: New invite code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InviteCode'
        '403':
          description: Requires admin role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found or no longer pending
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /license/redeem-invite:
    post:
      operationId: redeemInvite
      tags:
        - license
      summary: Redeem a single-use invite code from the desktop app (sets up the account and activates the device)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RedeemInviteInput'
      responses:
        '200':
          description: 'Invite redeemed - account created, device activated; returns the company license context'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InviteRedemptionResult'
        '400':
          description: Invalid, already-used invite code, or seat limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Company license is paused or cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /license/activate:
    post:
      operationId: activateLicense
      tags:
        - license
      summary: Activate a license key from the desktop app
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LicenseActivateInput'
      responses:
        '200':
          description: 'License activated - returns company, status and user directory'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LicenseInfo'
        '403':
          description: License is paused or cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Unknown license key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /license/verify:
    post:
      operationId: verifyLicense
      tags:
        - license
      summary: Re-verify a license key and sync the company user directory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LicenseVerifyInput'
      responses:
        '200':
          description: Current license status and user directory (also returned for paused/cancelled keys)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LicenseInfo'
        '404':
          description: Unknown license key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /field/assignments:
    get:
      operationId: listFieldAssignments
      tags:
        - field
      summary: List field assignments
      description: Returns all relayed field assignments with their evidence
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum:
              - assigned
              - in_progress
              - completed
              - cancelled
      responses:
        '200':
          description: Assignments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FieldAssignmentSync'
    put:
      operationId: pushFieldAssignments
      tags:
        - field
      summary: Push field assignments from desktop
      description: >-
        Bulk-upserts assignments into the relay. Snapshot fields are always refreshed; mutable
        service fields use last-write-wins by updatedAt. Evidence is append-only by id.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PushFieldAssignmentsRequest'
      responses:
        '200':
          description: Push result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PushFieldAssignmentsResult'
  '/field/assignments/{id}':
    patch:
      operationId: updateFieldAssignment
      tags:
        - field
      summary: Update a field assignment (mobile)
      description: Records service progress from the field agent
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateFieldAssignmentRequest'
      responses:
        '200':
          description: Updated assignment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FieldAssignmentSync'
        '404':
          description: Assignment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
  '/field/assignments/{id}/evidence':
    post:
      operationId: addFieldEvidence
      tags:
        - field
      summary: Attach service evidence (mobile)
      description: >-
        Adds a photo + GPS evidence record to an assignment. Idempotent by client-generated evidence
        id so offline queues can safely retry.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddFieldEvidenceRequest'
      responses:
        '200':
          description: Updated assignment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FieldAssignmentSync'
        '404':
          description: Assignment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
        code:
          type: string
          description: Machine-readable error code
    Plan:
      type: object
      required:
        - tier
        - name
        - description
        - seats
        - priceMonthlyCents
        - features
        - available
      properties:
        tier:
          type: string
          description: 'Stable tier key (starter, professional, enterprise)'
        name:
          type: string
        description:
          type: string
        seats:
          type: integer
          description: Maximum number of user seats included
        priceMonthlyCents:
          type: integer
        features:
          type: array
          items:
            type: string
        stripePriceId:
          type:
            - string
            - 'null'
          description: Live Stripe price id (null until Stripe products are seeded)
        available:
          type: boolean
          description: Whether checkout is currently available for this tier
        highlighted:
          type: boolean
    SignupInput:
      type: object
      required:
        - companyName
        - adminName
        - email
        - password
        - tier
      properties:
        companyName:
          type: string
          minLength: 1
        adminName:
          type: string
          minLength: 1
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        tier:
          type: string
    CheckoutSession:
      type: object
      required:
        - url
      properties:
        url:
          type: string
          description: URL to redirect the browser to
    CheckoutCompleteInput:
      type: object
      required:
        - sessionId
      properties:
        sessionId:
          type: string
          description: Stripe checkout session id from the success redirect
    ProvisionResult:
      type: object
      required:
        - licenseKey
        - companyName
        - tier
        - email
      properties:
        licenseKey:
          type: string
        companyName:
          type: string
        tier:
          type: string
        email:
          type: string
    LoginInput:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    SessionUser:
      type: object
      required:
        - id
        - email
        - name
        - role
        - isMasterAdmin
        - companyId
        - companyName
      properties:
        id:
          type: string
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum:
            - admin
            - manager
            - staff
            - readonly
        isMasterAdmin:
          type: boolean
        companyId:
          type: string
        companyName:
          type: string
    LicenseSummary:
      type: object
      required:
        - key
        - status
        - statusReason
      properties:
        key:
          type: string
        status:
          type: string
          enum:
            - active
            - paused
            - cancelled
          description: Effective status derived from the subscription lifecycle
        statusReason:
          type: string
          description: Human-readable explanation of the current status
        activatedAt:
          type:
            - string
            - 'null'
          format: date-time
        lastVerifiedAt:
          type:
            - string
            - 'null'
          format: date-time
        paidThrough:
          type:
            - string
            - 'null'
          format: date-time
          description: End of the last paid billing period
    SubscriptionSummary:
      type: object
      required:
        - tier
        - tierName
        - seats
        - status
      properties:
        tier:
          type: string
        tierName:
          type: string
        seats:
          type: integer
        status:
          type: string
          description: 'Raw Stripe subscription status (active, past_due, canceled, ...)'
        currentPeriodEnd:
          type:
            - string
            - 'null'
          format: date-time
        cancelAtPeriodEnd:
          type: boolean
        priceMonthlyCents:
          type:
            - integer
            - 'null'
    PortalOverview:
      type: object
      required:
        - company
        - license
        - subscription
        - seatsUsed
      properties:
        company:
          type: object
          required:
            - id
            - name
            - contactEmail
          properties:
            id:
              type: string
            name:
              type: string
            contactEmail:
              type: string
        license:
          $ref: '#/components/schemas/LicenseSummary'
        subscription:
          $ref: '#/components/schemas/SubscriptionSummary'
        seatsUsed:
          type: integer
    CompanyUser:
      type: object
      required:
        - id
        - email
        - name
        - role
        - active
        - isMasterAdmin
        - status
      properties:
        id:
          type: string
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum:
            - admin
            - manager
            - staff
            - readonly
        active:
          type: boolean
        isMasterAdmin:
          type: boolean
        username:
          type:
            - string
            - 'null'
          description: Admin-chosen desktop sign-in username; when null the desktop app derives one from the email local part
        status:
          type: string
          enum:
            - active
            - invited
            - deactivated
        createdAt:
          type:
            - string
            - 'null'
          format: date-time
    InviteInput:
      type: object
      required:
        - email
        - role
      properties:
        email:
          type: string
          format: email
        role:
          type: string
          enum:
            - admin
            - manager
            - staff
            - readonly
    InviteResult:
      type: object
      required:
        - user
        - inviteCode
        - inviteCodeExpiresAt
        - emailSent
      properties:
        user:
          $ref: '#/components/schemas/CompanyUser'
        inviteCode:
          type: string
          description: Single-use code the invitee enters in the desktop app to activate it and set up their account
        inviteCodeExpiresAt:
          type: string
          format: date-time
          description: When the invite code stops being redeemable (14 days after generation)
        emailSent:
          type: boolean
          description: Whether the invite email was sent to the invited user
    InviteCode:
      type: object
      required:
        - inviteCode
        - inviteCodeExpiresAt
        - email
        - role
      properties:
        inviteCode:
          type: string
        inviteCodeExpiresAt:
          type: string
          format: date-time
          description: When this code stops being redeemable (codes created before expiry tracking fall back to creation time + 14 days)
        email:
          type: string
        role:
          type: string
          enum:
            - admin
            - manager
            - staff
            - readonly
    CompanyUserUpdate:
      type: object
      properties:
        role:
          type: string
          enum:
            - admin
            - manager
            - staff
            - readonly
        active:
          type: boolean
        username:
          type:
            - string
            - 'null'
          maxLength: 32
          description: Desktop sign-in username (lowercase letters, digits, ".", "_", "-"); null clears it so the desktop app derives one from the email
    RedeemInviteInput:
      type: object
      required:
        - inviteCode
        - name
        - password
        - deviceId
      properties:
        inviteCode:
          type: string
          description: Single-use invite code (INV-XXXX-XXXX)
        name:
          type: string
          minLength: 1
          description: Full name the invitee chooses for their account
        password:
          type: string
          minLength: 8
          description: Password the invitee sets for their account
        deviceId:
          type: string
          description: Stable identifier for the installation
        deviceName:
          type: string
    InviteRedemptionResult:
      type: object
      required:
        - licenseKey
        - user
        - license
      properties:
        licenseKey:
          type: string
          description: The company license key this device is now bound to (used for later verify calls)
        user:
          $ref: '#/components/schemas/DirectoryUser'
        license:
          $ref: '#/components/schemas/LicenseInfo'
    DirectoryUser:
      type: object
      required:
        - id
        - email
        - name
        - role
        - active
        - isMasterAdmin
      properties:
        id:
          type: string
        email:
          type: string
        name:
          type: string
        username:
          type:
            - string
            - 'null'
          description: Admin-chosen desktop sign-in username; when null the desktop app derives one from the email local part
        role:
          type: string
          enum:
            - admin
            - manager
            - staff
            - readonly
        active:
          type: boolean
        isMasterAdmin:
          type: boolean
    LicenseActivateInput:
      type: object
      required:
        - licenseKey
        - deviceId
      properties:
        licenseKey:
          type: string
        deviceId:
          type: string
          description: Stable identifier for the installation
        deviceName:
          type: string
    LicenseVerifyInput:
      type: object
      required:
        - licenseKey
      properties:
        licenseKey:
          type: string
        deviceId:
          type: string
    LicenseInfo:
      type: object
      required:
        - status
        - statusReason
        - company
        - tier
        - seats
        - users
        - graceDays
        - verifiedAt
      properties:
        status:
          type: string
          enum:
            - active
            - paused
            - cancelled
        statusReason:
          type: string
        company:
          type: object
          required:
            - id
            - name
          properties:
            id:
              type: string
            name:
              type: string
        tier:
          type: string
        seats:
          type: integer
        paidThrough:
          type:
            - string
            - 'null'
          format: date-time
        users:
          type: array
          items:
            $ref: '#/components/schemas/DirectoryUser'
        graceDays:
          type: integer
          description: Days the desktop app may keep working offline before requiring re-verification
        verifiedAt:
          type: string
          format: date-time
    ErrorMessage:
      type: object
      properties:
        message:
          type: string
      required:
        - message
    FieldEvidenceSync:
      type: object
      properties:
        id:
          type: string
        photoDataUrl:
          type: string
        latitude:
          type:
            - number
            - 'null'
        longitude:
          type:
            - number
            - 'null'
        accuracyMeters:
          type:
            - number
            - 'null'
        capturedAt:
          type: string
        note:
          type: string
      required:
        - id
        - photoDataUrl
        - latitude
        - longitude
        - accuracyMeters
        - capturedAt
        - note
    FieldAssignmentSync:
      type: object
      properties:
        id:
          type: string
        noticeId:
          type: string
        assigneeName:
          type: string
        instructions:
          type: string
        status:
          type: string
          enum:
            - assigned
            - in_progress
            - completed
            - cancelled
        serviceMethod:
          type:
            - string
            - 'null'
          enum:
            - personal
            - substitute
            - post_and_mail
            - other
            - null
        completedAt:
          type:
            - string
            - 'null'
        serverNotes:
          type: string
        tenantNames:
          type: array
          items:
            type: string
        propertyAddress:
          type: string
        unit:
          type: string
        noticeType:
          type: string
        deadlineDate:
          type:
            - string
            - 'null'
