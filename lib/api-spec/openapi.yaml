        - comms
      summary: List tenant communication history
      parameters:
        - name: tenantId
          in: query
          required: false
          description: Filter to a single tenant
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: History entries, newest first
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TenantCommunicationSync'
    post:
      operationId: logTenantCommunication
      tags:
        - comms
      summary: Log a tenant communication event
      description: >-
        Records a log-only history entry (e.g. an automatic "notice served"
        event pushed from the desktop). Does not send email.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogTenantCommunicationRequest'
      responses:
        '200':
          description: Stored entry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantCommunicationSync'
  /comms/tenant-email:
    post:
      operationId: sendTenantEmail
      tags:
        - comms
      summary: Send an email to a tenant
      description: >-
        Sends the rendered message to the tenant's email address and records it
        in the tenant communication history with the delivery status.
      requestBody:
        required: true
        content:
          application/json:
            schema:
