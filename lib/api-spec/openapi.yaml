        Buildium Open API. Requires a valid RentNotice Pro license key. Buildium credentials are
        forwarded per-request and never stored.
      parameters:
        - $ref: '#/components/parameters/LicenseKeyHeader'
        - $ref: '#/components/parameters/BuildiumClientIdHeader'
