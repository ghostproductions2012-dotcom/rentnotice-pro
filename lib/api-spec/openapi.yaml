          description: Exactly two member keys (the caller and the other member)
          items:
            type: string
        memberNames:
          type: array
          description: Display names matching memberKeys by index
          items:
            type: string
        createdByKey:
          type: string
        createdByName:
          type: string
    ChatMessageSync:
      type: object
      required:
        - id
        - channelId
        - senderKey
        - senderName
        - body
        - createdAt
      properties:
        id:
          type: string
        channelId:
          type: string
        senderKey:
          type: string
        senderName:
          type: string
        body:
          type: string
        createdAt:
          type: string
    SendChatMessageRequest:
      type: object
      required:
        - id
        - senderKey
        - senderName
        - body
        - createdAt
      properties:
        id:
          type: string
          description: Client-generated id used for idempotent offline retries
        senderKey:
          type: string
        senderName:
          type: string
        body:
          type: string
        createdAt:
          type: string
    MarkChannelReadRequest:
      type: object
      required:
        - memberKey
        - lastReadAt
      properties:
        memberKey:
          type: string
        lastReadAt:
          type: string
    OkResult:
      type: object
      required:
        - ok
      properties:
        ok:
          type: boolean
    ChatDirectoryMember:
      type: object
      required:
        - memberKey
        - name
      properties:
        memberKey:
          type: string
          description: The key clients use as senderKey/memberKey
        name:
          type: string
        username:
          type: string
        email:
          type: string
        role:
          type: string
        active:
          type: boolean
        secretHash:
          type: string
          description: >-
            SHA-256 hex of the member's desktop password; empty when none is
            set (such members cannot mint chat tokens).
    ReplaceChatDirectoryRequest:
      type: object
      required:
        - members
      properties:
        members:
          type: array
          items:
            $ref: '#/components/schemas/ChatDirectoryMember'
    IssueChatTokenRequest:
      type: object
      required:
        - identifier
        - secret
      properties:
        identifier:
          type: string
          description: Email or username of the member
        secret:
          type: string
          description: The member's password
    ChatTokenResult:
      type: object
      required:
        - token
        - memberKey
        - memberName
      properties:
        token:
          type: string
        memberKey:
          type: string
        memberName:
          type: string
        expiresAt:
          type: string
          description: >-
            ISO timestamp after which the token stops working (401). Clients
            should sign in again (or silently re-mint) to get a fresh token.
    TenantCommunicationSync:
      type: object
      required:
        - id
        - tenantId
        - tenantName
        - tenantEmail
        - propertyAddress
        - kind
        - subject
        - bodyText
        - status
        - createdByKey
        - createdByName
        - createdAt
      properties:
        id:
          type: string
        tenantId:
          type: string
        tenantName:
          type: string
        tenantEmail:
          type: string
        propertyAddress:
          type: string
        kind:
          type: string
          enum:
            - email
            - announcement
            - notice_served
            - work_order
        subject:
          type: string
        bodyText:
          type: string
        status:
          type: string
          enum:
            - sent
            - failed
            - logged
        createdByKey:
          type: string
        createdByName:
          type: string
        createdAt:
          type: string
    SendTenantEmailRequest:
      type: object
      required:
        - tenantId
        - tenantName
        - tenantEmail
        - subject
        - bodyText
      properties:
        tenantId:
          type: string
        tenantName:
          type: string
        tenantEmail:
          type: string
        propertyAddress:
          type: string
        subject:
          type: string
        bodyText:
          type: string
        createdByKey:
          type: string
        createdByName:
          type: string
    LogTenantCommunicationRequest:
      type: object
      required:
        - tenantId
        - kind
      properties:
        tenantId:
          type: string
        kind:
          type: string
          enum:
            - announcement
            - notice_served
            - work_order
        tenantName:
          type: string
        tenantEmail:
          type: string
        propertyAddress:
          type: string
        subject:
          type: string
        bodyText:
          type: string
        createdByKey:
          type: string
        createdByName:
          type: string
        createdAt:
          type: string
        suppressEvent:
          type: boolean
          description: >-
            Skip the webhook event dispatch for this entry. Used when the
            originating event was already dispatched elsewhere (e.g. the
            field relay dispatches notice_served when a mobile user records
            service, and the desktop later mirrors it into tenant history).
    IntegrationSettings:
      type: object
      required:
        - slackConfigured
        - googleChatConfigured
        - slackWebhookUrlMasked
        - googleChatWebhookUrlMasked
        - events
        - mirrorTeamChat
        - updatedAt
      properties:
        slackConfigured:
          type: boolean
        googleChatConfigured:
          type: boolean
        slackWebhookUrlMasked:
          type: string
        googleChatWebhookUrlMasked:
          type: string
        events:
          type: array
          items:
            type: string
            enum:
              - work_order_assigned
              - work_order_completed
              - notice_served
              - tenant_email_sent
        mirrorTeamChat:
          type: boolean
        updatedAt:
          type:
            - string
            - 'null'
    UpdateIntegrationSettingsRequest:
      type: object
      properties:
        slackWebhookUrl:
          type: string
          description: New Slack incoming-webhook URL; empty string disconnects
        googleChatWebhookUrl:
          type: string
          description: New Google Chat incoming-webhook URL; empty string disconnects
        events:
          type: array
          items:
            type: string
            enum:
              - work_order_assigned
              - work_order_completed
              - notice_served
              - tenant_email_sent
        mirrorTeamChat:
          type: boolean
    TestIntegrationRequest:
      type: object
      required:
        - target
      properties:
        target:
          type: string
          enum:
            - slack
            - google_chat
    TestIntegrationResult:
      type: object
      required:
        - ok
        - message
      properties:
        ok:
          type: boolean
        message:
          type: string
