components:
  parameters:
    LicenseKeyHeader:
      name: x-license-key
      in: header
      required: true
      description: RentNotice Pro license key of the calling workspace
      schema:
        type: string
    BuildiumClientIdHeader:
      name: x-buildium-client-id
      in: header
      required: true
      description: Buildium API key client id (forwarded, never stored)
      schema:
        type: string
    BuildiumClientSecretHeader:
      name: x-buildium-client-secret
      in: header
      required: true
      description: Buildium API key secret (forwarded, never stored)
      schema:
        type: string
    BuildiumLimit:
      name: limit
      in: query
      description: Page size (Buildium max 1000)
      schema:
        type: integer
    BuildiumOffset:
      name: offset
      in: query
      description: Number of records to skip
      schema:
        type: integer
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
        code:
          type: string
          description: Machine-readable error code
    DownloadInfo:
      type: object
      required:
        - version
        - windowsExe
        - windowsMsi
        - macAppleSilicon
        - macIntel
      properties:
        version:
          type: string
          description: Release tag of the latest desktop build (e.g. v1.0.0)
        windowsExe:
          type:
            - string
            - 'null'
          description: Proxy download URL for the Windows NSIS installer
        windowsMsi:
          type:
            - string
            - 'null'
          description: Proxy download URL for the Windows MSI package
        macAppleSilicon:
          type:
            - string
            - 'null'
          description: Proxy download URL for the Apple Silicon .dmg
        macIntel:
          type:
            - string
            - 'null'
          description: Proxy download URL for the Intel .dmg
        macVersion:
          type:
            - string
            - 'null'
          description: >-
            Release tag the Mac installers come from when it differs from the
            latest release (e.g. Mac builds still in CI); null when Mac
            installers match the latest version
    Plan:
      type: object
      required:
        - tier
        - name
        - description
        - seats
        - priceMonthlyCents
        - features
        - available
      properties:
        tier:
          type: string
          description: 'Stable tier key (starter, professional, enterprise, unlimited)'
        name:
          type: string
        description:
          type: string
        seats:
          type:
            - integer
            - 'null'
          description: Maximum number of user seats included; null means unlimited
        priceMonthlyCents:
          type: integer
        features:
          type: array
          items:
            type: string
        stripePriceId:
          type:
            - string
            - 'null'
          description: Live Stripe price id (null until Stripe products are seeded)
        available:
          type: boolean
          description: Whether checkout is currently available for this tier
        highlighted:
          type: boolean
    SignupInput:
      type: object
      required:
        - companyName
        - adminName
        - email
        - password
        - tier
      properties:
        companyName:
          type: string
          minLength: 1
        adminName:
          type: string
          minLength: 1
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        tier:
          type: string
    CheckoutSession:
      type: object
      required:
        - url
      properties:
        url:
          type: string
          description: URL to redirect the browser to
    CheckoutCompleteInput:
      type: object
      required:
        - sessionId
      properties:
        sessionId:
          type: string
          description: Stripe checkout session id from the success redirect
    ProvisionResult:
      type: object
      required:
        - licenseKey
        - companyName
        - tier
        - email
      properties:
        licenseKey:
          type: string
        companyName:
          type: string
        tier:
          type: string
        email:
          type: string
    LoginInput:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    SessionUser:
      type: object
      required:
        - id
        - email
        - name
        - role
        - isMasterAdmin
        - companyId
        - companyName
      properties:
        id:
          type: string
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum:
            - admin
            - manager
            - staff
            - readonly
        isMasterAdmin:
          type: boolean
        companyId:
          type: string
        companyName:
          type: string
    LicenseSummary:
      type: object
      required:
        - key
        - status
        - statusReason
      properties:
        key:
          type: string
        status:
          type: string
