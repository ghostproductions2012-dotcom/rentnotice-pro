      responses:
        '200':
          description: Connection OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BuildiumPingResult'
        '401':
          description: Invalid license key or rejected Buildium credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BuildiumProxyError'
        '502':
          description: Buildium API unreachable or returned an unexpected error
          content:
            application/json:
              schema:
