openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: plans
    description: Public pricing plans
  - name: downloads
    description: Desktop installer downloads (proxied through the API server)
  - name: auth
    description: Website account authentication
  - name: checkout
    description: Stripe checkout / signup flow
  - name: portal
    description: Authenticated company admin portal
  - name: license
    description: License verification API used by the desktop app
  - name: field
    description: Field assignment sync relay for the mobile companion
  - name: comms
    description: >-
      Communications hub — team chat, tenant messaging history, and outbound
      Slack / Google Chat webhook integrations. License-scoped per company.
  - name: buildium
    description: >-
      Buildium Open API proxy used by the desktop app. Credentials are forwarded
      per-request via headers and never stored server-side.
  - name: admin
    description: Platform owner admin panel (separate from the company portal)
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags:
        - health
      summary: Health check
      description: Returns server health status
      responses:
        '200':
          description: Healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
  /www/plans:
    get:
      operationId: listPlans
      tags:
        - plans
      summary: List pricing plans (public)
      responses:
        '200':
          description: Available subscription tiers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Plan'
  /www/downloads/latest:
    get:
      operationId: getLatestDownloads
      tags:
        - downloads
      summary: Latest desktop release version and proxied download URLs (public)
      responses:
        '200':
          description: Latest release with per-platform proxy download URLs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DownloadInfo'
        '503':
          description: Release lookup failed (downloads temporarily unavailable)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  '/www/downloads/assets/{assetId}':
    get:
      operationId: downloadAsset
      tags:
        - downloads
      summary: Download an installer asset from a recent release (public)
      description: >-
        Redirects to a short-lived signed URL for the requested release asset.
        Only assets belonging to a recent published release are served (a
        platform's installer may come from an older release than the latest
        while newer builds are still in CI).
      parameters:
        - name: assetId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '302':
          description: Redirect to the signed installer download URL
        '404':
          description: Asset does not belong to a recent published release
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Downloads temporarily unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /www/checkout/session:
    post:
      operationId: startCheckout
      tags:
        - checkout
      summary: Start signup + Stripe checkout for a plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupInput'
      responses:
        '200':
          description: Stripe Checkout session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckoutSession'
        '400':
          description: Invalid input (e.g. email already registered)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Payments unavailable (Stripe not configured)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /www/checkout/complete:
    post:
      operationId: completeCheckout
      tags:
        - checkout
      summary: 'Finalize a paid checkout session, provisioning company, master admin and license key'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckoutCompleteInput'
      responses:
        '200':
          description: Company provisioned (idempotent - returns existing result on retry)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProvisionResult'
        '400':
          description: Session not paid or unknown
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /www/auth/login:
    post:
      operationId: login
      tags:
        - auth
      summary: Log in with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginInput'
      responses:
        '200':
          description: Logged in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionUser'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /www/auth/logout:
    post:
      operationId: logout
      tags:
        - auth
      summary: Log out the current session
      responses:
        '204':
          description: Logged out
  /www/auth/me:
    get:
      operationId: getMe
      tags:
        - auth
      summary: Get the currently logged-in user
      responses:
        '200':
          description: Current session user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionUser'
        '401':
          description: Not logged in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /www/portal/overview:
    get:
      operationId: getPortalOverview
      tags:
        - portal
      summary: 'Company overview - license key, live status, subscription details'
      responses:
        '200':
          description: Portal overview
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortalOverview'
        '401':
          description: Not logged in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /www/portal/billing:
    post:
      operationId: createBillingSession
      tags:
        - portal
      summary: Create a Stripe billing portal session (manage/upgrade/cancel subscription)
      responses:
        '200':
          description: Billing portal session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckoutSession'
        '401':
          description: Not logged in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Requires admin role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /www/portal/users:
    get:
      operationId: listCompanyUsers
      tags:
        - portal
      summary: List company users and their roles
      responses:
        '200':
          description: Company user directory
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CompanyUser'
        '401':
          description: Not logged in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      operationId: inviteCompanyUser
      tags:
        - portal
      summary: Invite a user by email with a role (returns a shareable invite link)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InviteInput'
      responses:
        '201':
          description: Invitation created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InviteResult'
        '400':
          description: Email already in company or over seat limit
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Requires admin role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  '/www/portal/users/{userId}':
    patch:
      operationId: updateCompanyUser
      tags:
        - portal
      summary: Change a user's role or deactivate/reactivate them
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompanyUserUpdate'
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanyUser'
        '400':
          description: Invalid change (e.g. demoting the master admin)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Requires admin role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  '/www/portal/users/{userId}/invite-code':
    get:
      operationId: getInviteCode
      tags:
        - portal
      summary: View the pending invite code for an invited user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Pending invite code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InviteCode'
        '403':
          description: Requires admin role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found or no longer pending
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      operationId: regenerateInviteCode
      tags:
        - portal
      summary: Regenerate the invite code for a still-pending invitee (invalidates the old code)
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: New invite code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegeneratedInviteCode'
        '403':
          description: Requires admin role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found or no longer pending
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /license/redeem-invite:
    post:
      operationId: redeemInvite
      tags:
        - license
      summary: Redeem a single-use invite code from the desktop app (sets up the account and activates the device)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RedeemInviteInput'
      responses:
        '200':
          description: 'Invite redeemed - account created, device activated; returns the company license context'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InviteRedemptionResult'
        '400':
          description: Invalid, already-used invite code, or seat limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Company license is paused or cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /license/change-password:
    post:
      operationId: changeCloudPassword
      tags:
        - license
      summary: Change a directory member's own password from the desktop app (verifies the current password)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangeCloudPasswordInput'
      responses:
        '204':
          description: Password changed; existing website sessions for the account are revoked
        '400':
          description: Invalid input (new password must be at least 8 characters)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Current password is incorrect or the account cannot sign in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Unknown license key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /license/activate:
    post:
      operationId: activateLicense
      tags:
        - license
      summary: Activate a license key from the desktop app
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LicenseActivateInput'
      responses:
        '200':
          description: 'License activated - returns company, status and user directory'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LicenseInfo'
        '403':
          description: License is paused or cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Unknown license key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /license/verify:
    post:
      operationId: verifyLicense
      tags:
        - license
      summary: Re-verify a license key and sync the company user directory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LicenseVerifyInput'
      responses:
        '200':
          description: Current license status and user directory (also returned for paused/cancelled keys)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LicenseInfo'
        '404':
          description: Unknown license key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /field/assignments:
    get:
      operationId: listFieldAssignments
      tags:
        - field
      summary: List field assignments
      description: Returns all relayed field assignments with their evidence
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum:
              - assigned
              - in_progress
              - completed
              - cancelled
      responses:
        '200':
          description: Assignments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FieldAssignmentSync'
    put:
      operationId: pushFieldAssignments
      tags:
        - field
      summary: Push field assignments from desktop
      description: >-
        Bulk-upserts assignments into the relay. Snapshot fields are always refreshed; mutable
        service fields use last-write-wins by updatedAt. Evidence is append-only by id.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PushFieldAssignmentsRequest'
      responses:
        '200':
          description: Push result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PushFieldAssignmentsResult'
  '/field/assignments/{id}':
    patch:
      operationId: updateFieldAssignment
      tags:
        - field
      summary: Update a field assignment (mobile)
      description: Records service progress from the field agent
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateFieldAssignmentRequest'
      responses:
        '200':
          description: Updated assignment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FieldAssignmentSync'
        '404':
          description: Assignment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
  '/field/assignments/{id}/evidence':
    post:
      operationId: addFieldEvidence
      tags:
        - field
      summary: Attach service evidence (mobile)
      description: >-
        Adds a photo + GPS evidence record to an assignment. Idempotent by client-generated evidence
        id so offline queues can safely retry.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddFieldEvidenceRequest'
      responses:
        '200':
          description: Updated assignment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FieldAssignmentSync'
        '404':
          description: Assignment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
  /field/work-orders:
    get:
      operationId: listWorkOrderAssignments
      tags:
        - field
      summary: List relayed work-order assignments
      description: Returns all relayed maintenance work orders with their photos
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum:
              - new
              - assigned
              - in_progress
              - on_hold
              - completed
              - cancelled
      responses:
        '200':
          description: Work-order assignments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WorkOrderSync'
    put:
      operationId: pushWorkOrderAssignments
      tags:
        - field
      summary: Push work-order assignments from desktop
      description: >-
        Bulk-upserts assigned work orders into the relay. Snapshot fields are always refreshed;
        mutable field-state uses last-write-wins by updatedAt. Photos are append-only by id.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PushWorkOrdersRequest'
      responses:
        '200':
          description: Push result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PushWorkOrdersResult'
  '/field/work-orders/{id}':
    patch:
      operationId: updateWorkOrderAssignment
      tags:
        - field
      summary: Update a work order (mobile)
      description: Records maintenance progress from the field agent
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWorkOrderRequest'
      responses:
        '200':
          description: Updated work order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkOrderSync'
        '404':
          description: Work order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
  '/field/work-orders/{id}/photos':
    post:
      operationId: addWorkOrderPhoto
      tags:
        - field
      summary: Attach a maintenance photo (mobile)
      description: >-
        Adds a photo + GPS record to a work order. Idempotent by client-generated photo id so
        offline queues can safely retry.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddWorkOrderPhotoRequest'
      responses:
        '200':
          description: Updated work order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkOrderSync'
        '404':
          description: Work order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
  /comms/directory:
    put:
      operationId: replaceChatDirectory
      tags:
        - comms
      summary: Replace the replicated desktop team member directory
      description: >-
        Replace-set of the desktop app's local-only users (those without a
        cloud account) so the server can validate chat identities. Requires
        the workspace license key; portal sessions cannot rewrite the
        directory.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReplaceChatDirectoryRequest'
      responses:
        '200':
          description: Directory replaced
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResult'
        '403':
          description: Missing license credential
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /comms/identity/token:
    post:
      operationId: issueChatToken
      tags:
        - comms
      summary: Issue a chat member token
      description: >-
        The member proves who they are with their own credentials (email or
        username plus password) and receives a member token. The token must
        accompany all team-chat requests in the `x-member-token` header —
        the license key alone identifies the company, not the person.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IssueChatTokenRequest'
      responses:
        '200':
          description: Member token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatTokenResult'
        '401':
          description: Credentials not recognized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /comms/members:
    get:
      operationId: listTeamMembers
      tags:
        - comms
      summary: List team members
      description: >-
        Returns the active team members of the calling company (cloud users
        plus replicated desktop-local users), used for direct messages and
        sender identity in team chat. Requires a member token or portal
        session.
      responses:
        '200':
          description: Team members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TeamMemberSync'
        '401':
          description: Missing or invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /comms/channels:
    get:
      operationId: listChatChannels
      tags:
        - comms
      summary: List chat channels and DMs
      description: >-
        Returns the company's channels plus the caller's DMs, each with the
        latest message preview and an unread count computed from the caller's
        read state.
      parameters:
        - name: memberKey
          in: query
          required: true
          description: Caller member key used for unread counts and DM visibility
          schema:
            type: string
      responses:
        '200':
          description: Channels
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ChatChannelSync'
        '401':
          description: Missing or invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      operationId: createChatChannel
      tags:
        - comms
      summary: Create a team chat channel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateChatChannelRequest'
      responses:
        '200':
          description: Created channel
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatChannelSync'
        '409':
          description: A channel with this name already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  '/comms/channels/{id}/archive':
    post:
      operationId: setChatChannelArchived
      tags:
        - comms
      summary: Archive or restore a channel
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetChannelArchivedRequest'
      responses:
        '200':
          description: Updated channel
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatChannelSync'
        '404':
          description: Channel not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /comms/dms:
    post:
      operationId: openDirectMessage
      tags:
        - comms
      summary: Open (get or create) a direct-message conversation
      description: >-
        Idempotent by member pair — returns the existing DM when one already
        exists between the two members.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OpenDirectMessageRequest'
      responses:
        '200':
          description: The DM conversation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatChannelSync'
  '/comms/channels/{id}/messages':
    get:
      operationId: listChatMessages
      tags:
        - comms
      summary: List messages in a channel
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: memberKey
          in: query
          required: false
          description: >-
            The requesting member's key. Required for direct-message
            conversations — only the two participants may read a DM.
          schema:
            type: string
        - name: after
          in: query
          required: false
          description: Only return messages created strictly after this ISO timestamp
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: Messages in chronological order
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ChatMessageSync'
        '404':
          description: Channel not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      operationId: sendChatMessage
      tags:
        - comms
      summary: Send a message
      description: >-
        Idempotent by client-generated message id so offline queues can safely
        retry.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendChatMessageRequest'
      responses:
        '200':
          description: Stored message
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatMessageSync'
        '404':
          description: Channel not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  '/comms/channels/{id}/read':
    post:
      operationId: markChatChannelRead
      tags:
        - comms
      summary: Mark a channel as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MarkChannelReadRequest'
      responses:
        '200':
          description: Acknowledged
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResult'
  /comms/tenant-communications:
    get:
      operationId: listTenantCommunications
