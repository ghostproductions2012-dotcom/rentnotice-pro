name: Release (Desktop Installers)

# Build signed/unsigned desktop installers for RentNotice Pro and attach them to
# a DRAFT GitHub Release whenever a version tag (e.g. v1.2.3) is pushed.
#
# All code-signing / notarization / updater-signing secrets are OPTIONAL. When a
# secret is unset the corresponding step is skipped and the build still produces
# working (unsigned) installers — nothing hard-fails just because a secret is
# missing. See artifacts/rentnotice-pro/BUILDING.md for the full secrets table.

on:
  push:
    tags:
      - "v*"
  # Allow manual dry-runs from the Actions tab.
  workflow_dispatch:

# Required so tauri-action can create the draft Release and upload assets.
permissions:
  contents: write

env:
  # The production licensing/API server the installed desktop apps talk to.
  # Change this ONE value if the server ever moves (e.g. to a custom domain
  # like https://www.rentnoticepro.com), then cut a new release.
  VITE_LICENSE_API_URL: "https://cross-platform-ghost-music.replit.app"

jobs:
  release:
    name: Build ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            label: macOS (Apple Silicon)
            args: "--target aarch64-apple-darwin"
            rust-targets: "aarch64-apple-darwin"
          - platform: macos-latest
            label: macOS (Intel)
            args: "--target x86_64-apple-darwin"
            rust-targets: "x86_64-apple-darwin"
          - platform: windows-latest
            label: Windows
            args: ""
            rust-targets: ""
          - platform: ubuntu-22.04
            label: Linux
            args: ""
            rust-targets: ""

    runs-on: ${{ matrix.platform }}

    # Boolean flags only — real secret values are injected in the guarded steps
    # below. (The `secrets` context is not allowed in step `if:` conditions.)
    env:
      HAS_APPLE_CERT: ${{ secrets.APPLE_CERTIFICATE != '' }}
      HAS_WINDOWS_CERT: ${{ secrets.WINDOWS_CERTIFICATE != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf \
            build-essential \
            file

      - name: Enable Corepack (pnpm)
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "artifacts/rentnotice-pro/src-tauri -> target"

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      # Signing is optional. IMPORTANT: the signing env vars must only be set
      # when the secrets are non-empty — Tauri's bundler treats an EMPTY
      # APPLE_CERTIFICATE as "present" and fails trying to import it.
      - name: Enable Apple code signing (only if certificate secret is set)
        if: startsWith(matrix.platform, 'macos') && env.HAS_APPLE_CERT == 'true'
        run: |
          {
            echo "APPLE_CERTIFICATE=${{ secrets.APPLE_CERTIFICATE }}"
            echo "APPLE_CERTIFICATE_PASSWORD=${{ secrets.APPLE_CERTIFICATE_PASSWORD }}"
            echo "APPLE_SIGNING_IDENTITY=${{ secrets.APPLE_SIGNING_IDENTITY }}"
            echo "APPLE_ID=${{ secrets.APPLE_ID }}"
            echo "APPLE_PASSWORD=${{ secrets.APPLE_PASSWORD }}"
            echo "APPLE_TEAM_ID=${{ secrets.APPLE_TEAM_ID }}"
          } >> "$GITHUB_ENV"

      - name: Import Windows signing certificate
        if: matrix.platform == 'windows-latest' && env.HAS_WINDOWS_CERT == 'true'
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        shell: pwsh
        run: |
          $pfxBytes = [System.Convert]::FromBase64String($env:WINDOWS_CERTIFICATE)
          $pfxPath = Join-Path $env:RUNNER_TEMP "windows-signing.pfx"
          [System.IO.File]::WriteAllBytes($pfxPath, $pfxBytes)
          $securePwd = ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -Force -AsPlainText
          $cert = Import-PfxCertificate -FilePath $pfxPath -CertStoreLocation Cert:\CurrentUser\My -Password $securePwd
          "WINDOWS_SIGN_THUMBPRINT=$($cert.Thumbprint)" | Out-File -FilePath $env:GITHUB_ENV -Append
          Remove-Item $pfxPath -Force
          Write-Host "Imported Windows signing certificate ($($cert.Thumbprint))."

      - name: Build desktop installers
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: artifacts/rentnotice-pro
          tagName: ${{ github.ref_name }}
          releaseName: "RentNotice Pro ${{ github.ref_name }}"
          releaseBody: "Download the installer for your operating system below. This build is a draft — review, then publish the release."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
